name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  unit-tests:
    name: Unit Tests · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: uv run pytest tests/ --ignore=tests/e2e -q --cov=sapclimcp --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  type-check:
    name: Type Safety (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run mypy
        run: uv run mypy src/sapclimcp/ --ignore-missing-imports

  install:
    name: Install & Verify · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package from source
        run: |
          uv venv
          uv pip install .

      - name: CLI entry point works
        run: uv run sapcli-mcp --help

      - name: Credential CLI works
        run: uv run sapcli-mcp credential --help

      - name: All modules importable
        run: |
          uv run python -c "from sapclimcp.config import SecretRef, KEYRING_SERVICE; print('config: OK')"
          uv run python -c "from sapclimcp.cli import main; print('cli: OK')"
          uv run python -c "from sapclimcp.server import create_mcp_server; print('server: OK')"

      - name: Keyring credential roundtrip (Windows only)
        if: runner.os == 'Windows'
        run: |
          uv run sapcli-mcp credential set ci-test-key "ci-test-value"
          uv run sapcli-mcp credential get ci-test-key
          uv run sapcli-mcp credential delete ci-test-key

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pip-audit

      - name: Run pip-audit
        run: uv run pip-audit
