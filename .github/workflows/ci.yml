name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  unit-tests:
    name: Unit Tests · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: uv run pytest tests/ --ignore=tests/e2e -q --cov=sapclimcp --cov-report=term-missing --cov-fail-under=1

      - name: Generate coverage XML
        if: matrix.os == 'ubuntu-latest'
        run: uv run coverage xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml

  type-check:
    name: Type Safety (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run mypy
        run: uv run mypy src/sapclimcp/ --ignore-missing-imports

  install:
    name: Install & Verify · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      # ─── Default install (no keyring extra) ────────────────────────
      # Exercises the soft-import fallback path: the package must be
      # importable, the CLI must run, and `keyring:` SecretRefs must
      # raise the install hint instead of crashing on ImportError.
      - name: Install package from source (default — no keyring)
        run: |
          uv venv
          uv pip install .

      - name: CLI entry point works (no keyring)
        run: uv run sapcli-mcp --help

      - name: Credential CLI parser works (no keyring)
        run: uv run sapcli-mcp credential --help

      - name: All modules importable (no keyring)
        run: |
          uv run python -c "from sapclimcp.config import SecretRef, KEYRING_SERVICE, keyring; assert keyring is None, 'keyring should be None in default install'; print('config: OK, keyring soft-import is None as expected')"
          uv run python -c "from sapclimcp.cli import main, keyring; assert keyring is None; print('cli: OK')"
          uv run python -c "from sapclimcp.server import create_mcp_server; print('server: OK')"

      - name: Credential subcommands fail gracefully without keyring
        shell: bash
        run: |
          set +e
          out=$(uv run sapcli-mcp credential set k v 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::credential set should have failed without keyring (rc=$rc)"
            exit 1
          fi
          echo "$out" | grep -q "pip install -e .\[keyring\]" || {
            echo "::error::expected install hint in stderr, got: $out"
            exit 1
          }
          echo "OK: keyring-missing install hint surfaced"

      - name: SecretRef keyring: prefix raises ConfigError without keyring
        run: |
          uv run python -c "from sapclimcp.config import SecretRef; from sapclimcp.errors import ConfigError;
          import sys
          try:
              SecretRef('keyring:X').resolve()
          except ConfigError as ex:
              assert 'pip install -e .[keyring]' in str(ex), str(ex)
              print('OK: SecretRef raises install hint')
              sys.exit(0)
          sys.exit('ConfigError not raised')"

      # ─── Install WITH keyring extra ────────────────────────────────
      # Validates the credential roundtrip works once the extra is in.
      # Re-installs (force) so the venv has keyring this time.
      - name: Install package with [keyring] extra
        run: uv pip install -e ".[keyring]"

      - name: Keyring credential roundtrip (Windows only)
        if: runner.os == 'Windows'
        run: |
          uv run sapcli-mcp credential set ci-test-key "ci-test-value"
          uv run sapcli-mcp credential get ci-test-key
          uv run sapcli-mcp credential delete ci-test-key

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Export production dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip freeze --exclude-editable > requirements-prod.txt

      - name: Run pip-audit
        run: pipx run pip-audit -r requirements-prod.txt
