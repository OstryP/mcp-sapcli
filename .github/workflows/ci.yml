name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (flake8 + pylint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: flake8
        run: uv run flake8 src/sapclimcp/ src/sapcli-mcp-server.py src/sapcli-mcp-client.py start-mcp.py

      - name: pylint
        run: uv run pylint src/sapclimcp/ src/sapcli-mcp-server.py src/sapcli-mcp-client.py start-mcp.py

  unit-tests:
    name: Unit Tests · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: uv run pytest tests/ --ignore=tests/e2e -q --cov=sapclimcp --cov-report=term-missing --cov-fail-under=1

      - name: Generate coverage XML
        if: matrix.os == 'ubuntu-latest'
        run: uv run coverage xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml

  type-check:
    name: Type Safety (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run mypy
        run: uv run mypy --config-file=mypy.ini src/sapclimcp/ src/sapcli-mcp-server.py src/sapcli-mcp-client.py start-mcp.py

  install:
    name: Install & Verify · ${{ matrix.os }} · extras=${{ matrix.extras }}
    runs-on: ${{ matrix.os }}
    # `uv run` triggers `uv sync` by default, which would re-resolve the
    # lockfile and reinstall packages — including `keyring`, which the
    # extras=none jobs explicitly uninstall to verify the soft-import
    # path. UV_NO_SYNC=1 makes every `uv run` invocation in this job
    # use the venv as-is. The install step uses `uv pip install`
    # (not `uv run`), so it's unaffected.
    env:
      UV_NO_SYNC: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        extras: [none, keyring]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      # Each (os, extras) combination installs into its own fresh venv.
      # Independent green/red signal per platform × extras dimension —
      # a regression in the no-keyring path cannot be masked by a
      # subsequent reinstall in the same job.
      - name: Install package (extras=${{ matrix.extras }})
        shell: bash
        run: |
          uv venv
          if [ "${{ matrix.extras }}" = "keyring" ]; then
            uv pip install -e ".[keyring]"
          else
            uv pip install .
          fi

      # `keyring` reaches the venv transitively via fastmcp →
      # py-key-value-aio[keyring], so even a bare `uv pip install .` (no
      # extras) leaves it importable. The whole point of extras=none is
      # to verify the soft-import path actually works when keyring is
      # NOT importable — so explicitly uninstall it here. All subsequent
      # extras=none verification steps run in a genuinely no-keyring
      # environment (UV_NO_SYNC=1 at the job level prevents `uv run`
      # from quietly re-syncing keyring back in).
      - name: Force-uninstall keyring (extras=none)
        if: matrix.extras == 'none'
        shell: bash
        run: |
          uv pip uninstall keyring
          # Confirm: importing keyring must now fail.
          uv run python -c "
          try:
              import keyring  # noqa: F401
          except ImportError:
              print('OK: keyring is uninstalled')
          else:
              import sys
              sys.exit('FAIL: keyring still importable after uninstall')
          "

      - name: Read install hint from package constant
        id: hint
        # Output is consumed only by the extras=none verification steps
        # below — gate to avoid wasted work on the keyring matrix legs.
        if: matrix.extras == 'none'
        shell: bash
        run: |
          hint=$(uv run python -c "from sapclimcp.errors import KEYRING_INSTALL_HINT; print(KEYRING_INSTALL_HINT)")
          echo "value=$hint" >> "$GITHUB_OUTPUT"

      - name: CLI entry point works
        shell: bash
        run: uv run sapcli-mcp --help

      - name: Credential CLI parser works
        shell: bash
        run: uv run sapcli-mcp credential --help

      # ─── Verification specific to extras=none ──────────────────────
      - name: Soft-import sentinels are None (extras=none)
        if: matrix.extras == 'none'
        shell: bash
        run: |
          uv run python -c "from sapclimcp.config import SecretRef, KEYRING_SERVICE, is_keyring_available; assert not is_keyring_available(); print('config: OK')"
          # Verify the soft-import mechanism directly (sentinel = None) — not
          # via is_keyring_available(), because we want to catch a regression
          # where the public API drifts from the underlying sentinel.
          uv run python -c "from sapclimcp.cli import main, keyring; assert keyring is None; print('cli: OK')"
          # This server import chains fastmcp → py-key-value-aio, which declares
          # keyring as an extra that is NOT installed here. It succeeds only
          # because py-key-value-aio imports keyring lazily. If a future version
          # eager-imports it, this step fails with ModuleNotFoundError from the
          # transitive dep — that's a py-key-value-aio change, not a regression
          # in sapclimcp.server's own soft-import.
          uv run python -c "from sapclimcp.server import create_mcp_server; print('server: OK')"

      - name: Credential subcommands fail gracefully (extras=none)
        if: matrix.extras == 'none'
        shell: bash
        run: |
          set +e
          out=$(uv run sapcli-mcp credential set k v 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::credential set should have failed without keyring (rc=$rc)"
            exit 1
          fi
          echo "$out" | grep -qF "${{ steps.hint.outputs.value }}" || {
            echo "::error::expected install hint '${{ steps.hint.outputs.value }}' in stderr, got: $out"
            exit 1
          }
          echo "OK: keyring-missing install hint surfaced"

      - name: SecretRef keyring prefix raises ConfigError (extras=none)
        if: matrix.extras == 'none'
        shell: bash
        run: |
          uv run python <<'PY'
          import sys
          from sapclimcp.config import SecretRef
          from sapclimcp.errors import ConfigError, KEYRING_INSTALL_HINT
          try:
              SecretRef('keyring:X').resolve()
          except ConfigError as ex:
              assert KEYRING_INSTALL_HINT in str(ex), str(ex)
              print('OK: SecretRef raises install hint')
              sys.exit(0)
          sys.exit('ConfigError not raised')
          PY

      # ─── Verification specific to extras=keyring ───────────────────
      - name: keyring is importable (extras=keyring)
        if: matrix.extras == 'keyring'
        shell: bash
        run: |
          uv run python -c "from sapclimcp.config import is_keyring_available; assert is_keyring_available(); print('config: keyring available')"

      - name: Keyring credential roundtrip (extras=keyring, Windows only)
        if: matrix.extras == 'keyring' && runner.os == 'Windows'
        shell: bash
        run: |
          uv run sapcli-mcp credential set ci-test-key "ci-test-value"
          uv run sapcli-mcp credential get ci-test-key
          uv run sapcli-mcp credential delete ci-test-key

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Export production dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip freeze --exclude-editable > requirements-prod.txt

      - name: Run pip-audit
        run: pipx run pip-audit -r requirements-prod.txt
