name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  unit-tests:
    name: Unit Tests · ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: uv run pytest tests/ --ignore=tests/test_e2e.py -q

  type-check:
    name: Type Safety (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run mypy
        run: uv run mypy src/sapclimcp/ --ignore-missing-imports

  package:
    name: Install & Verify · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package from source
        run: |
          uv venv
          uv pip install .

      - name: CLI entry point works
        run: uv run sapcli-mcp --help

      - name: Credential CLI works
        run: uv run sapcli-mcp credential --help

      - name: All modules importable
        run: |
          uv run python -c "from sapclimcp.config import SecretRef, KEYRING_SERVICE; print('config: OK')"
          uv run python -c "from sapclimcp.cli import main; print('cli: OK')"
          uv run python -c "from sapclimcp.server import create_mcp_server; print('server: OK')"

      - name: Credential store/retrieve roundtrip
        run: |
          uv run python -c "
          import sys, platform
          # Only Windows CI has a headless credential store
          # Linux has no secret service, macOS Keychain needs user interaction
          if platform.system() != 'Windows':
              print(f'keyring roundtrip: SKIPPED ({platform.system()} CI has no headless keyring)')
              sys.exit(0)
          import keyring
          keyring.set_password('sapcli-mcp', 'ci-test-key', 'ci-test-value')
          val = keyring.get_password('sapcli-mcp', 'ci-test-key')
          assert val == 'ci-test-value', f'Expected ci-test-value, got {val}'
          print('keyring roundtrip: OK')
          keyring.delete_password('sapcli-mcp', 'ci-test-key')
          "
